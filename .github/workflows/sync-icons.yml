name: Sync Icons to CDN

on:
  push:
    branches:
      - main
    paths:
      - 'icons/**'

  workflow_dispatch:

jobs:
  sync-icons:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="icons-v${VERSION}"

          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists, skipping"
            exit 0
          fi

          zip -r "/tmp/tabler-icons-${VERSION}.zip" icons/

          gh release create "$TAG" \
            --title "Tabler Icons v${VERSION}" \
            --notes "Synced from [tabler/tabler-icons](https://github.com/tabler/tabler-icons) v${VERSION}" \
            "/tmp/tabler-icons-${VERSION}.zip#tabler-icons-${VERSION}.zip"

          echo "Created release $TAG"
