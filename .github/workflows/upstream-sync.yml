name: Sync Upstream

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync from upstream tabler/tabler-icons
        run: |
          git remote add upstream https://github.com/tabler/tabler-icons.git
          git fetch upstream

          # Check if upstream/main has commits not yet in HEAD
          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "Already up to date with upstream"
            exit 0
          fi

          NEW_COMMITS=$(git rev-list --count HEAD..upstream/main)
          git merge upstream/main --no-edit
          git push origin HEAD:main
          echo "Synced ${NEW_COMMITS} new commit(s) from upstream"
